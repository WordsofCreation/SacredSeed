<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SacredSeed | Redirecting</title>
    <meta name="robots" content="noindex, nofollow" />
    <script>
      (() => {
        const path = window.location.pathname.replace(/^\/SacredSeed/, '') || '/';
        const destination = `/SacredSeed/#${path}`;
        window.location.replace(destination);
      })();
    </script>
  </head>
  <body></body>
</html>
